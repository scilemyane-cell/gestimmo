name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/**'
      - '*.html'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Copier les pages web à jour dans mobile/www
        run: |
          cp ../index.html www/index.html
          cp ../dashboard.html www/dashboard.html
          cp ../structure.html www/structure.html
          cp ../holding.html www/holding.html 2>/dev/null || true
          cp ../import.html www/import.html 2>/dev/null || true

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installer les dépendances npm
        run: npm install

      - name: Synchroniser Capacitor
        run: npx cap sync android

      - name: Autoriser l'exécution de gradlew
        run: chmod +x android/gradlew

      - name: Compiler l'APK de debug
        working-directory: mobile/android
        run: ./gradlew assembleDebug

      - name: Publier l'APK compilé
        uses: actions/upload-artifact@v4
        with:
          name: gestimmo-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
